<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Arcade Dash</title>
<link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

canvas{
display:block;
}

</style>

</head>

<body>

<canvas id="game"></canvas>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

resize();
onresize=resize;



let dead=false;

let score=0;
let speed=7;

let timer=0;
let shake=0;

let ship=false;
let holding=false;

let time=0;

let difficulty=0;
let levelTime=0;

const maxSpeed=14;



const player={

x:150,
y:0,
size:40,
vy:0,
rot:0

};



const spikes=[];
const platforms=[];
const portals=[];
const particles=[];
const trail=[];



function gy(){

return canvas.height-120;

}


player.y=gy()-40;







function restart(){

dead=false;

score=0;

speed=7;

difficulty=0;
levelTime=0;

ship=false;


spikes.length=0;
platforms.length=0;
portals.length=0;
particles.length=0;
trail.length=0;


player.y=gy()-40;
player.vy=0;

}







document.addEventListener("keydown",e=>{


if(e.code==="Space"){

holding=true;


if(dead)

restart();



if(!ship && player.y+40>=gy()){

player.vy=-18;

}

}

});



document.addEventListener("keyup",()=>{

holding=false;

});



document.addEventListener("mousedown",()=>{


holding=true;


if(dead)

restart();



if(!ship && player.y+40>=gy()){

player.vy=-18;

}


});


document.addEventListener("mouseup",()=>{

holding=false;

});









function spawn(){


let chance=Math.random();



if(chance<0.85){


let amount=Math.min(

3,

Math.floor(
Math.random()*(2+difficulty/5)
)+1

);



for(let i=0;i<amount;i++){


spikes.push({

x:canvas.width+i*45,

w:40,

h:65,

passed:false

});


}


}


else if(chance<0.95){


platforms.push({

x:canvas.width,

y:gy()-150-Math.random()*150,

w:130,

h:20

});


}


else{


portals.push({

x:canvas.width,

y:gy()-220,

w:50,

h:100

});


}


}









function explode(x,y){


let colors=[

"#00ffff",
"#ff006e",
"#ffd60a",
"#00ff00",
"#ffffff"

];



for(let i=0;i<120;i++){


let a=Math.random()*Math.PI*2;

let f=3+Math.random()*14;



particles.push({

x,
y,

vx:Math.cos(a)*f,

vy:Math.sin(a)*f,

life:60,

color:
colors[Math.floor(Math.random()*colors.length)]

});


}



shake=45;


}








function collide(a,b){

return(

a.x<b.x+b.w &&
a.x+a.size>b.x &&
a.y<b.y+b.h &&
a.y+a.size>b.y

);

}









function update(){


time+=0.05;



if(dead){


particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

});


return;

}







levelTime++;


if(levelTime%300===0){


difficulty++;


if(speed<maxSpeed)

speed+=0.4;


}







timer++;


if(timer>Math.max(35,60-difficulty*3)){


spawn();

timer=0;

}







trail.push({

x:player.x,

y:player.y,

life:20

});


if(trail.length>15)

trail.shift();









if(ship){


if(holding)

player.vy-=0.8;

else

player.vy+=0.6;



player.y+=player.vy;


}

else{


player.vy+=0.9;

player.y+=player.vy;



if(player.y+40>=gy()){


player.y=gy()-40;

player.vy=0;


}


}








if(player.y<0 ||
player.y+40>gy()){


dead=true;

explode(

player.x+20,

player.y+20

);


}






player.rot+=0.05;








// spikes

for(let i=spikes.length-1;i>=0;i--){


let s=spikes[i];


s.x-=speed;



if(!s.passed && s.x+s.w<player.x){


s.passed=true;

score++;

spikes.splice(i,1);

continue;

}




if(collide(player,{

x:s.x,

y:gy()-s.h,

w:s.w,

h:s.h

})){

dead=true;

explode(
player.x+20,
player.y+20
);

}


}








// platforms

for(let i=platforms.length-1;i>=0;i--){


let p=platforms[i];


p.x-=speed;



if(!ship &&
player.vy>=0 &&
player.x+40>p.x &&
player.x<p.x+p.w &&
player.y+40>=p.y &&
player.y+40<=p.y+20
){


player.y=p.y-40;

player.vy=0;

}



if(p.x+p.w<0)

platforms.splice(i,1);


}









// portals

for(let i=portals.length-1;i>=0;i--){


let p=portals[i];


p.x-=speed;



if(collide(player,p)){


ship=!ship;

player.vy=0;


portals.splice(i,1);

}


}









particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

p.life--;

});



if(shake>0)

shake*=0.9;


}









function draw(){


ctx.save();



if(shake>1){

ctx.translate(

(Math.random()-0.5)*shake,

(Math.random()-0.5)*shake

);

}







let bg=ctx.createLinearGradient(
0,
0,
0,
canvas.height
);


bg.addColorStop(0,"#08001f");

bg.addColorStop(1,"#001020");


ctx.fillStyle=bg;


ctx.fillRect(

0,
0,
canvas.width,
canvas.height

);








// TITLE

ctx.save();


ctx.textAlign="center";

ctx.font="bold 45px Arial";


ctx.shadowBlur=
30+Math.sin(time)*15;


ctx.shadowColor="#00ffff";


let g=ctx.createLinearGradient(
canvas.width/2-200,
0,
canvas.width/2+200,
0
);


g.addColorStop(0,"#00ffff");

g.addColorStop(.5,"#ff006e");

g.addColorStop(1,"#ffd60a");


ctx.fillStyle=g;


ctx.fillText(

"ARCADE DASH",

canvas.width/2,

65

);


ctx.restore();








ctx.shadowBlur=25;

ctx.shadowColor="#00ffff";


ctx.fillStyle="#00ffff";


ctx.fillRect(

0,
gy(),
canvas.width,
5

);



ctx.shadowBlur=0;








platforms.forEach(p=>{


ctx.fillStyle="#ffd60a";

ctx.fillRect(
p.x,
p.y,
p.w,
p.h
);

});









spikes.forEach(s=>{


ctx.shadowBlur=30;

ctx.shadowColor="#ff006e";


ctx.fillStyle="#ff006e";


ctx.beginPath();


ctx.moveTo(
s.x,
gy()
);


ctx.lineTo(
s.x+s.w/2,
gy()-s.h
);


ctx.lineTo(
s.x+s.w,
gy()
);


ctx.fill();


});









portals.forEach(p=>{


ctx.strokeStyle="#00ff00";

ctx.lineWidth=6;


ctx.beginPath();


ctx.ellipse(

p.x+25,
p.y+50,

25,
50,

0,
0,
Math.PI*2

);


ctx.stroke();


});








trail.forEach(t=>{


ctx.fillStyle=

"rgba(0,255,255,"+

t.life/25+

")";


ctx.fillRect(

t.x,
t.y,
40,
40

);


t.life--;

});









ctx.save();


ctx.translate(

player.x+20,
player.y+20

);


ctx.rotate(player.rot);


ctx.shadowBlur=35;

ctx.shadowColor="#00ffff";


ctx.fillStyle="#00ffff";


ctx.fillRect(

-20,
-20,
40,
40

);


ctx.restore();









particles.forEach(p=>{


ctx.shadowBlur=20;

ctx.shadowColor=p.color;


ctx.fillStyle=p.color;


ctx.globalAlpha=p.life/60;


ctx.fillRect(

p.x,
p.y,
7,
7

);


ctx.globalAlpha=1;

ctx.shadowBlur=0;


});








ctx.fillStyle="white";

ctx.font="30px Arial";


ctx.fillText(

"SCORE: "+score,

20,

120

);


ctx.fillStyle="#ff006e";


ctx.fillText(

"LEVEL: "+difficulty,

20,

160

);








if(ship){

ctx.fillStyle="#00ff00";


ctx.fillText(

"SHIP MODE",

20,

200

);

}









if(dead){


ctx.font="60px Arial";

ctx.fillStyle="#ff006e";


ctx.fillText(

"GAME OVER",

canvas.width/2-190,

canvas.height/2

);


ctx.font="25px Arial";

ctx.fillStyle="white";


ctx.fillText(

"SPACE TO RESTART",

canvas.width/2-130,

canvas.height/2+50

);


}



ctx.restore();


}









function loop(){

update();

draw();

requestAnimationFrame(loop);

}


loop();


</script>

</body>
</html></html>
