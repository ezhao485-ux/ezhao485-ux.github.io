<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lennox Dash</title>
<link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    border:4px solid #00ffff;
    background:linear-gradient(#222,#111);
}
</style>
</head>
<body>

<canvas id="game" width="1000" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    x:120,
    y:350,
    width:40,
    height:40,
    velY:0,
    jumping:false,
    rotation:0
};

let gravityDirection = 1;
const gravity = 0.8;
const jumpForce = -15;
const floorY = 350;

let spikes = [];
let portals = [];
let score = 0;
let gameOver = false;

function jump(){
    if(!player.jumping && !gameOver){
        player.velY = jumpForce * gravityDirection;
        player.jumping = true;
    }
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space" || e.code==="ArrowUp"){
        if(gameOver){
            restart();
        }else{
            jump();
        }
    }
});

canvas.addEventListener("click",()=>{
    if(gameOver){
        restart();
    }else{
        jump();
    }
});

function restart(){
    score = 0;
    spikes = [];
    portals = [];
    gravityDirection = 1;
    gameOver = false;

    player.y = floorY;
    player.velY = 0;
    player.rotation = 0;
    player.jumping = false;
}

function collision(a,b){
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

let spikeTimer = 0;
let portalTimer = 0;

function spawnSpikes(){

    let amount = Math.floor(Math.random()*3)+1;

    for(let i=0;i<amount;i++){
        spikes.push({
            x:canvas.width + i*38,
            y:floorY,
            width:40,
            height:40
        });
    }
}

function spawnPortal(){
    portals.push({
        x:canvas.width,
        y:140,
        width:50,
        height:100,
        used:false
    });
}

function update(){

    if(gameOver) return;

    score++;

    player.velY += gravity * gravityDirection;
    player.y += player.velY;

    if(gravityDirection === 1){

        if(player.y >= floorY){
            player.y = floorY;
            player.velY = 0;
            player.jumping = false;
        }

    }else{

        if(player.y <= 0){
            player.y = 0;
            player.velY = 0;
            player.jumping = false;
        }

    }

    if(player.jumping){
        player.rotation += 0.15;
    }

    spikeTimer++;

    if(spikeTimer > 90){
        spawnSpikes();
        spikeTimer = 0;
    }

    portalTimer++;

    if(portalTimer > 450){
        spawnPortal();
        portalTimer = 0;
    }

    for(let i=spikes.length-1;i>=0;i--){

        spikes[i].x -= 7;

        if(collision(player,spikes[i])){
            gameOver = true;
        }

        if(spikes[i].x < -50){
            spikes.splice(i,1);
        }
    }

    for(let i=portals.length-1;i>=0;i--){

        let p = portals[i];

        p.x -= 7;

        if(!p.used && collision(player,p)){
            gravityDirection *= -1;
            player.velY = 0;
            p.used = true;
        }

        if(p.x < -100){
            portals.splice(i,1);
        }
    }
}

function drawBackground(){

    ctx.fillStyle = "#00ffff";
    ctx.fillRect(0,0,canvas.width,5);
    ctx.fillRect(0,390,canvas.width,5);

    for(let i=0;i<canvas.width;i+=50){

        ctx.fillStyle = "#333";
        ctx.fillRect(i,395,30,30);

        ctx.fillRect(i,5,30,30);
    }
}

function drawPlayer(){

    ctx.save();

    ctx.translate(
        player.x + player.width/2,
        player.y + player.height/2
    );

    ctx.rotate(player.rotation);

    ctx.fillStyle = "#00ff66";
    ctx.shadowColor = "#00ff66";
    ctx.shadowBlur = 15;

    ctx.fillRect(
        -player.width/2,
        -player.height/2,
        player.width,
        player.height
    );

    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawSpikes(){

    spikes.forEach(spike=>{

        ctx.fillStyle="#ff3366";

        ctx.beginPath();
        ctx.moveTo(
            spike.x,
            spike.y + spike.height
        );

        ctx.lineTo(
            spike.x + spike.width/2,
            spike.y
        );

        ctx.lineTo(
            spike.x + spike.width,
            spike.y + spike.height
        );

        ctx.closePath();
        ctx.fill();
    });
}

function drawPortals(){

    portals.forEach(portal=>{

        ctx.strokeStyle="#ff00ff";
        ctx.lineWidth=6;

        ctx.shadowColor="#ff00ff";
        ctx.shadowBlur=20;

        ctx.beginPath();

        ctx.ellipse(
            portal.x + portal.width/2,
            portal.y + portal.height/2,
            portal.width/2,
            portal.height/2,
            0,
            0,
            Math.PI*2
        );

        ctx.stroke();

        ctx.shadowBlur=0;
    });
}

function drawUI(){

    ctx.fillStyle="#00ffff";
    ctx.font="bold 50px Impact";
    ctx.textAlign="center";

    ctx.shadowColor="#00ffff";
    ctx.shadowBlur=15;

    ctx.fillText(
        "LENNOX DASH",
        canvas.width/2,
        60
    );

    ctx.shadowBlur=0;

    ctx.textAlign="left";

    ctx.fillStyle="white";
    ctx.font="24px Arial";

    ctx.fillText(
        "Score: " + Math.floor(score/10),
        20,
        40
    );

    if(gameOver){

        ctx.fillStyle="white";
        ctx.font="60px Impact";
        ctx.textAlign="center";

        ctx.fillText(
            "GAME OVER",
            canvas.width/2,
            180
        );

        ctx.font="28px Arial";

        ctx.fillText(
            "Press SPACE or CLICK to restart",
            canvas.width/2,
            240
        );
    }
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawBackground();
    drawPlayer();
    drawSpikes();
    drawPortals();
    drawUI();
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
