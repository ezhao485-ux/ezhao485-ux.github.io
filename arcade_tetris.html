<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">
    <title>Arcade Tetris</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            letter-spacing: 4px;
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            border: 4px solid #333;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        canvas {
            border: 2px solid #00ffcc;
            background: #111;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .sidebar {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 400px;
            width: 150px;
        }

        .info-box {
            background: #222;
            border: 2px solid #ff007f;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .info-box h2 {
            font-size: 1rem;
            margin: 0 0 5px 0;
            color: #ff007f;
        }

        .info-box p {
            font-size: 1.5rem;
            margin: 0;
            font-weight: bold;
        }

        #nextCanvas {
            border: 2px solid #ff007f;
            background: #111;
            margin-top: 5px;
        }

        .controls {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>ARCADE TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="sidebar">
            <div class="info-box">
                <h2>SCORE</h2>
                <p id="score">0</p>
            </div>
            
            <div class="info-box">
                <h2>LEVEL</h2>
                <p id="level">1</p>
            </div>

            <div class="info-box">
                <h2>NEXT</h2>
                <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
        </div>
    </div>

    <div class="controls">
        <p><strong>CONTROLS:</strong><br>← / → : Move Left/Right<br>↑ : Rotate | ↓ : Soft Drop<br>Space : Hard Drop</p>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextContext = nextCanvas.getContext('2d');

context.scale(20, 20);
nextContext.scale(20, 20);

// Colors matching classic arcade neon vibe
const COLORS = [
    null,
    '#ff007f', // T (Pink)
    '#00ffcc', // I (Cyan)
    '#ffaa00', // O (Orange)
    '#00ff00', // J (Green)
    '#ff0000', // Z (Red)
    '#9900ff', // S (Purple)
    '#ffff00'  // L (Yellow)
];

// Tetromino shapes
const SHAPES = 'TIJOZSL';

function createPiece(type) {
    if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
    if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
    if (type === 'O') return [[3, 3], [3, 3]];
    if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
    if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'L') return [[0, 7, 0], [0, 7, 0], [0, 7, 7]];
}

const arena = Array.from({length: 20}, () => Array(12).fill(0));

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    nextMatrix: null,
    score: 0,
    level: 1,
    lines: 0
};

function drawMatrix(matrix, offset, ctx) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = COLORS[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                // Grid overlay inside pieces for an arcade feel
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.05;
                ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function draw() {
    context.fillStyle = '#111';
    context.fillRect(0, 0, canvas.width, canvas.height);

    // Draw grid lines
    context.strokeStyle = '#222';
    context.lineWidth = 0.05;
    for (let i = 0; i < 12; i++) context.strokeRect(i, 0, 1, 20);
    for (let i = 0; i < 20; i++) context.strokeRect(0, i, 12, 1);

    drawMatrix(arena, {x: 0, y: 0}, context);
    drawMatrix(player.matrix, player.pos, context);
}

function drawNext() {
    nextContext.fillStyle = '#111';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    
    // Center the preview piece loosely
    const offset = {x: 1, y: 1};
    if (player.nextMatrix.length === 2) offset.x = 1; // O piece sizing
    drawMatrix(player.nextMatrix, offset, nextContext);
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] &&
                arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 100 * player.level;
        player.lines += 1;
        rowCount *= 2; // Combo multiplier

        if (player.lines % 10 === 0) {
            player.level++;
            dropInterval = Math.max(100, 1000 - (player.level * 90)); // Increase speed
        }
    }
    updateScore();
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function playerReset() {
    if (!player.nextMatrix) {
        player.nextMatrix = createPiece(SHAPES[SHAPES.length * Math.random() | 0]);
    }
    player.matrix = player.nextMatrix;
    player.nextMatrix = createPiece(SHAPES[SHAPES.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

    if (collide(arena, player)) {
        // Game Over
        alert(`GAME OVER\nFinal Score: ${player.score}`);
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.level = 1;
        player.lines = 0;
        dropInterval = 1000;
        updateScore();
    }
    drawNext();
}

function playerRotate() {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -1);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    matrix.forEach(row => row.reverse());
}

function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
}

function updateScore() {
    document.getElementById('score').innerText = player.score;
    document.getElementById('level').innerText = player.level;
}

let dropCounter = 0;
let dropInterval = 1000; // start drop speed 1 second
let lastTime = 0;

function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

document.addEventListener('keydown', event => {
    if (event.key === 'ArrowLeft') {
        playerMove(-1);
    } else if (event.key === 'ArrowRight') {
        playerMove(1);
    } else if (event.key === 'ArrowDown') {
        playerDrop();
    } else if (event.key === 'ArrowUp') {
        playerRotate();
    } else if (event.key === ' ') {
        playerHardDrop();
    }
});

// Start the game
playerReset();
updateScore();
update();
</script>
</body>
</html>
