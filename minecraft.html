<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCraft Launcher</title>
    <link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .launcher-container {
            width: 420px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            color: #4caf50;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #2b2b2b;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #4caf50;
        }

        .btn-launch {
            width: 100%;
            padding: 15px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-launch:hover {
            background: #45a049;
        }

        #game-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: black;
            z-index: 9999;
        }

        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10000;
            padding: 10px 16px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }

        .back-btn:hover {
            background: red;
        }
    </style>
</head>
<body>

<button class="back-btn" id="backBtn" onclick="closeGame()">
    Close Game
</button>

<div class="launcher-container" id="launcher">

    <h1>WebCraft</h1>

    <div class="form-group">
        <label for="username">Username</label>
        <input
            type="text"
            id="username"
            value="Player"
            placeholder="Player123">
    </div>

    <div class="form-group">
        <label for="version">Select Version</label>

        <select id="version">

            <option value="https://classic.minecraft.net">
                Minecraft Classic (Official 0.0.23a)
            </option>

            <option value="https://eaglercraftx.pages.dev">
                Eaglercraft 1.8.8
            </option>

            <option value="https://eaglercraft1122.pages.dev">
                Eaglercraft 1.12.2
            </option>

            <option value="https://eaglercraft-bj5.pages.dev">
                Eaglercraft 1.5.2
            </option>

        </select>
    </div>

    <button class="btn-launch" onclick="launchGame()">
        PLAY
    </button>

</div>

<iframe id="game-screen"></iframe>

<script>
function launchGame() {
    const username = document.getElementById("username").value.trim();
    const gameUrl = document.getElementById("version").value;

    if (!username) {
        alert("Please enter a username!");
        return;
    }

    localStorage.setItem("webcraft_username", username);

    document.getElementById("launcher").style.display = "none";
    document.getElementById("game-screen").src = gameUrl;
    document.getElementById("game-screen").style.display = "block";
    document.getElementById("backBtn").style.display = "block";
}

function closeGame() {
    document.getElementById("game-screen").src = "";
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("launcher").style.display = "block";
}

window.onload = function () {
    const savedName = localStorage.getItem("webcraft_username");

    if (savedName) {
        document.getElementById("username").value = savedName;
    }
};
</script>

</body>
</html>
