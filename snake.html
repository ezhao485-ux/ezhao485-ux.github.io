<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arcade Snake</title>
<link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020202;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    font-family:Arial, sans-serif;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        transparent 0px,
        transparent 2px,
        rgba(255,255,255,.03) 3px
    );
}

.container{
    text-align:center;
}

h1{
    color:#00ff99;
    text-shadow:0 0 20px #00ff99;
    margin-bottom:10px;
    letter-spacing:4px;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    color:#00ff99;
    font-size:20px;
}

canvas{
    background:#050505;
    border:3px solid #00ff99;
    box-shadow:0 0 30px #00ff99;
}

#message{
    margin-top:10px;
    font-size:22px;
    color:#ff5555;
    height:30px;
}
</style>
</head>
<body>

<div class="container">
    <h1>ARCADE SNAKE</h1>

    <div class="stats">
        <div id="score">Score: 0</div>
        <div id="high">High: 0</div>
    </div>

    <canvas id="game" width="700" height="700"></canvas>

    <div id="message"></div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRID = 20;
const TILES = canvas.width / GRID;

let snake;
let food;
let dx;
let dy;
let score;
let speed;
let gameOver;

let particles=[];
let shake=0;

const highScore =
    localStorage.getItem("snakeHigh") || 0;

document.getElementById("high").innerText =
    "High: " + highScore;

function resetGame(){

    snake=[
        {x:15,y:15}
    ];

    food=randomFood();

    dx=1;
    dy=0;

    score=0;
    speed=120;
    gameOver=false;

    particles=[];

    document.getElementById("score").innerText=
        "Score: 0";

    document.getElementById("message").innerText="";
}

function randomFood(){

    return{
        x:Math.floor(Math.random()*TILES),
        y:Math.floor(Math.random()*TILES)
    };

}

function createExplosion(x,y){

    for(let i=0;i<25;i++){

        particles.push({
            x,
            y,
            vx:(Math.random()-0.5)*10,
            vy:(Math.random()-0.5)*10,
            life:40,
            color:`hsl(${Math.random()*80+80},100%,60%)`
        });

    }

    shake=12;
}

function updateParticles(){

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
    });

    particles=particles.filter(p=>p.life>0);

}

function update(){

    if(gameOver) return;

    const head={
        x:snake[0].x+dx,
        y:snake[0].y+dy
    };

    if(
        head.x<0 ||
        head.y<0 ||
        head.x>=TILES ||
        head.y>=TILES
    ){
        lose();
        return;
    }

    for(let part of snake){

        if(
            head.x===part.x &&
            head.y===part.y
        ){
            lose();
            return;
        }
    }

    snake.unshift(head);

    if(
        head.x===food.x &&
        head.y===food.y
    ){

        score++;

        document.getElementById("score").innerText=
            "Score: "+score;

        createExplosion(
            food.x*GRID+GRID/2,
            food.y*GRID+GRID/2
        );

        food=randomFood();

        if(score%5===0){
            speed=Math.max(50,speed-5);
        }

    }else{
        snake.pop();
    }

    updateParticles();
}

function lose(){

    gameOver=true;

    let currentHigh =
        parseInt(localStorage.getItem("snakeHigh") || 0);

    if(score>currentHigh){

        localStorage.setItem(
            "snakeHigh",
            score
        );

        document.getElementById("high").innerText=
            "High: "+score;
    }

    document.getElementById("message").innerText=
        "GAME OVER - PRESS SPACE";
}

function drawGrid(){

    ctx.strokeStyle="rgba(0,255,150,.08)";

    for(let i=0;i<TILES;i++){

        ctx.beginPath();
        ctx.moveTo(i*GRID,0);
        ctx.lineTo(i*GRID,canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i*GRID);
        ctx.lineTo(canvas.width,i*GRID);
        ctx.stroke();
    }
}

function drawFood(){

    const pulse=
        Math.sin(Date.now()*0.01)*4;

    ctx.beginPath();

    ctx.arc(
        food.x*GRID+GRID/2,
        food.y*GRID+GRID/2,
        8+pulse,
        0,
        Math.PI*2
    );

    ctx.fillStyle="#ff3355";
    ctx.shadowColor="#ff3355";
    ctx.shadowBlur=25;
    ctx.fill();
}

function drawSnake(){

    snake.forEach((segment,index)=>{

        let hue=(Date.now()/20+index*15)%360;

        ctx.fillStyle=
            `hsl(${hue},100%,60%)`;

        ctx.shadowColor=
            `hsl(${hue},100%,60%)`;

        ctx.shadowBlur=18;

        ctx.fillRect(
            segment.x*GRID+2,
            segment.y*GRID+2,
            GRID-4,
            GRID-4
        );
    });
}

function drawParticles(){

    particles.forEach(p=>{

        ctx.globalAlpha=
            p.life/40;

        ctx.fillStyle=p.color;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            3,
            0,
            Math.PI*2
        );

        ctx.fill();
    });

    ctx.globalAlpha=1;
}

function render(){

    ctx.save();

    if(shake>0){

        ctx.translate(
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );

        shake*=0.92;
    }

    ctx.fillStyle="#050505";
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();

    ctx.restore();
}

let lastTime=0;

function gameLoop(timestamp){

    if(timestamp-lastTime>speed){

        update();
        lastTime=timestamp;
    }

    render();

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown",e=>{

    if(gameOver &&
        e.code==="Space"){
        resetGame();
        return;
    }

    if(
        e.key==="ArrowUp" &&
        dy!==1
    ){
        dx=0;
        dy=-1;
    }

    if(
        e.key==="ArrowDown" &&
        dy!==-1
    ){
        dx=0;
        dy=1;
    }

    if(
        e.key==="ArrowLeft" &&
        dx!==1
    ){
        dx=-1;
        dy=0;
    }

    if(
        e.key==="ArrowRight" &&
        dx!==-1
    ){
        dx=1;
        dy=0;
    }
});

resetGame();
requestAnimationFrame(gameLoop);

</script>

</body>
</html>
