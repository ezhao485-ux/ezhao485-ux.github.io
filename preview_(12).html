<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DON'T TURN AROUND</title>
<link rel="icon" type="image/svg+xml" href="https://ethanzhao.org/minecraft_logo.svg">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 14,
    speed: 4.5
};

// MONSTER
const monster = {
    x: 100,
    y: 100,
    size: 30,
    speed: 1.6
};

const keys = {};
let time = 0;
let gameOver = false;

// JUMPSCARE SYSTEM
let scare = false;
let scareTimer = 0;

window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// creepy audio sting
function scareSound() {
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(90, audio.currentTime);

    gain.gain.setValueAtTime(0.25, audio.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.6);

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.start();
    osc.stop(audio.currentTime + 0.6);
}

// random scare trigger
function maybeScare() {
    if (!scare && Math.random() < 0.003) {
        scare = true;
        scareTimer = 25;
        scareSound();
    }
}

function update() {

    // movement
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    // monster chase (gets faster over time)
    let dx = player.x - monster.x;
    let dy = player.y - monster.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let speedBoost = 1 + time / 4000;

    monster.x += (dx/dist) * monster.speed * speedBoost;
    monster.y += (dy/dist) * monster.speed * speedBoost;

    if(dist < player.size + monster.size) {
        gameOver = true;
        scare = true;
    }

    maybeScare();

    if(scare) {
        scareTimer--;
        if(scareTimer <= 0) scare = false;
    }

    time++;
}

function draw() {

    // darkness
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // flashlight effect
    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, 150, 0, Math.PI*2);
    ctx.clip();

    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // monster (creepy shape)
    ctx.fillStyle = "darkred";
    ctx.beginPath();
    ctx.arc(monster.x, monster.y, monster.size, 0, Math.PI*2);
    ctx.fill();

    // glowing eyes
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(monster.x - 6, monster.y - 5, 3, 0, Math.PI*2);
    ctx.arc(monster.x + 6, monster.y - 5, 3, 0, Math.PI*2);
    ctx.fill();

    // player
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // UI
    ctx.fillStyle = "white";
    ctx.font = "18px monospace";
    ctx.fillText("Time Survived: " + Math.floor(time/60), 20, 30);

    // JUMPSCARE EFFECT
    if(scare) {

        ctx.fillStyle = "red";
        ctx.globalAlpha = 0.9;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.globalAlpha = 1;

        ctx.fillStyle = "black";
        ctx.font = "60px Arial";
        ctx.fillText("IT IS RIGHT BEHIND YOU", canvas.width/2 - 350, canvas.height/2);

        // creepy face
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2 - 120, 90, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(canvas.width/2 - 30, canvas.height/2 - 140, 10, 0, Math.PI*2);
        ctx.arc(canvas.width/2 + 30, canvas.height/2 - 140, 10, 0, Math.PI*2);
        ctx.fill();

        // shake effect
        canvas.style.transform = "translate(" + (Math.random()*10-5) + "px," + (Math.random()*10-5) + "px)";
    } else {
        canvas.style.transform = "translate(0,0)";
    }

    if(gameOver) {
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "red";
        ctx.font = "80px Arial";
        ctx.fillText("YOU WERE TAKEN", canvas.width/2 - 300, canvas.height/2);
    }
}

function loop() {
    if(!gameOver) update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
